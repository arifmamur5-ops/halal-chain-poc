services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: halal-anvil
    network_mode: host
    command: ["anvil", "--host", "0.0.0.0"]

  api:
    build: ./api
    container_name: halal-api
    network_mode: host
    environment:
      - RPC_URL=http://127.0.0.1:8545
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - PORT=3000
    depends_on:
      - anvil
